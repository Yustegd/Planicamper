<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planicamper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- MENÚ -->
<div id="menu" class="menu">
  <div class="logo">LOGO PLANICAMPER</div>

  <div class="user">
    <div class="avatar"></div>
    <span>Arlene Mckinney</span>
  </div>

  <ul class="menu-items">
    <li>Inicio</li>
    <li>Mis viajes</li>
    <li>Planificar viaje</li>
    <li>Destinos</li>
    <li>Ruta</li>
    <li>Ajustes</li>
  </ul>
</div>

<div id="overlay" class="overlay"></div>

<!-- APP -->
<div class="app">

<header class="header">
  <button id="menuBtn">☰</button>
  <h1>Inicio</h1>
  <span>🔔</span>
</header>

<main class="content">

  <div class="welcome">
    <h2>¡Hola Arlene!</h2>
    <p>¿A dónde quieres viajar?</p>
    <button class="primary-btn">+ Planificar nuevo viaje</button>
  </div>

  <!-- 🔥 MIS VIAJES (SCROLL REAL) -->
  <div class="section">
    <div class="section-header">
      <h3>Mis Viajes</h3>
      <span>Ver todos</span>
    </div>

    <div class="scroll-container">
      <div class="card">1</div>
      <div class="card">2</div>
      <div class="card">3</div>
      <div class="card">4</div>
      <div class="card">5</div>
    </div>
  </div>

  <!-- DESTINOS -->
  <div class="section">
    <h3>Destinos Populares</h3>
    <div class="cards">
      <div class="small-card">Costa</div>
      <div class="small-card">Montaña</div>
      <div class="small-card">Pueblos</div>
    </div>
  </div>

</main>

<nav class="bottom-nav">
  <div>Inicio</div>
  <div>Planificar</div>
  <div>Mapa</div>
  <div>Perfil</div>
</nav>

</div>

<script src="script.js"></script>
</body>
</html>
